<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Great Lakes Horizon Scan — Reddit Topic Browser</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px;
    color: #111;
    background: #f9f9f7;
    line-height: 1.6;
  }

  header {
    background: #00274c;
    color: #fff;
    padding: 28px 40px 22px;
    border-bottom: 3px solid #ffcb05;
  }
  header h1 { font-size: 1.4rem; font-weight: bold; letter-spacing: 0.01em; }
  header p  { font-size: 0.85rem; margin-top: 6px; color: #ccd9e8; }

  .container { max-width: 1100px; margin: 0 auto; padding: 30px 40px; }

  /* ── Topic table ── */
  .topic-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    font-size: 0.9rem;
    background: #fff;
    border: 1px solid #ddd;
  }
  .topic-table thead th {
    background: #00274c;
    color: #fff;
    text-align: left;
    padding: 10px 14px;
    font-weight: normal;
    letter-spacing: 0.03em;
    font-size: 0.8rem;
    text-transform: uppercase;
  }
  .topic-table tbody tr {
    border-bottom: 1px solid #e8e8e8;
    cursor: pointer;
    transition: background 0.12s;
  }
  .topic-table tbody tr:hover { background: #eef3f9; }
  .topic-table tbody tr.active { background: #dce8f5; }
  .topic-table td { padding: 9px 14px; vertical-align: top; }
  .topic-table td:first-child { width: 36px; color: #666; font-family: monospace; }
  .topic-table td:nth-child(3) { width: 60px; text-align: right; color: #444; }

  .label { font-weight: bold; color: #00274c; }
  .keywords { margin-top: 3px; }
  .kw {
    display: inline-block;
    background: #edf2fa;
    border: 1px solid #c5d5ea;
    border-radius: 3px;
    padding: 1px 7px;
    margin: 2px 3px 2px 0;
    font-size: 0.78rem;
    color: #2a4a70;
    font-family: "Courier New", monospace;
  }

  /* ── Comment panel ── */
  #detail {
    margin-top: 28px;
    background: #fff;
    border: 1px solid #ddd;
    display: none;
  }
  #detail-header {
    background: #00274c;
    color: #fff;
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #detail-header h2 { font-size: 1rem; font-weight: bold; }
  #detail-header span { font-size: 0.8rem; color: #aac4de; }
  #detail-close {
    cursor: pointer;
    font-size: 1.2rem;
    color: #aac4de;
    line-height: 1;
    padding: 0 4px;
  }
  #detail-close:hover { color: #fff; }

  #comment-list { padding: 0; }

  .comment {
    padding: 14px 18px;
    border-bottom: 1px solid #ebebeb;
  }
  .comment:last-child { border-bottom: none; }
  .comment-meta {
    font-size: 0.78rem;
    color: #777;
    margin-bottom: 5px;
    font-family: "Courier New", monospace;
  }
  .comment-meta .sub { color: #00274c; font-weight: bold; }
  .comment-meta .score { margin-left: 10px; }
  .comment-text { font-size: 0.88rem; line-height: 1.65; color: #222; }

  /* ── Meta bar ── */
  .meta-bar {
    font-size: 0.82rem;
    color: #666;
    margin-bottom: 14px;
    font-family: "Courier New", monospace;
  }

  h2.section { font-size: 1rem; color: #00274c; margin-bottom: 6px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
</style>
</head>
<body>

<header>
  <h1>Great Lakes Horizon Scan — Reddit Topic Browser</h1>
  <p>Social media analysis · Reddit 2023–2026 · 8,441 filtered comments · 34 topics identified via BERTopic</p>
</header>

<div class="container">

  <p class="meta-bar" id="meta-bar">Loading topics…</p>

  <h2 class="section">Topics</h2>
  <table class="topic-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Topic · Keywords</th>
        <th>Posts</th>
      </tr>
    </thead>
    <tbody id="topic-tbody"></tbody>
  </table>

  <div id="detail">
    <div id="detail-header">
      <h2 id="detail-title"></h2>
      <span id="detail-count"></span>
      <span id="detail-close" onclick="closeDetail()">✕</span>
    </div>
    <div id="comment-list"></div>
  </div>

</div>

<script>
let topicsData = [];
let activeRow  = null;

async function init() {
  const res  = await fetch("data/topics.json");
  const json = await res.json();
  topicsData = json.topics;

  document.getElementById("meta-bar").textContent =
    `${topicsData.length} topics · generated ${json.generated} · click a row to view comments`;

  const tbody = document.getElementById("topic-tbody");
  topicsData.forEach((t, i) => {
    const tr = document.createElement("tr");
    tr.dataset.id = t.id;
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>
        <div class="label">${t.label}</div>
        <div class="keywords">${t.keywords.map(k => `<span class="kw">${k}</span>`).join("")}</div>
      </td>
      <td>${t.count}</td>`;
    tr.addEventListener("click", () => loadTopic(t.id, tr));
    tbody.appendChild(tr);
  });
}

async function loadTopic(tid, row) {
  if (activeRow) activeRow.classList.remove("active");
  activeRow = row;
  row.classList.add("active");

  document.getElementById("detail").style.display = "block";
  document.getElementById("comment-list").innerHTML =
    "<div style='padding:18px;color:#666;font-size:0.85rem'>Loading…</div>";

  const res  = await fetch(`data/topics/t${tid}.json`);
  const data = await res.json();

  document.getElementById("detail-title").textContent = data.label;
  document.getElementById("detail-count").textContent =
    `${data.comments.length} representative comments (sorted by score)`;

  const list = document.getElementById("comment-list");
  list.innerHTML = "";

  data.comments.forEach(c => {
    const div = document.createElement("div");
    div.className = "comment";
    const srcLink = c.url
      ? `<a href="${c.url}" target="_blank" rel="noopener" style="margin-left:10px;color:#2a6496;font-size:0.75rem">↗ source</a>`
      : "";
    div.innerHTML = `
      <div class="comment-meta">
        <span class="sub">r/${c.subreddit}</span>
        <span class="score">↑ ${c.score}</span>
        <span style="margin-left:10px">${c.date}</span>
        ${srcLink}
      </div>
      <div class="comment-text">${escapeHtml(c.text)}</div>`;
    list.appendChild(div);
  });

  document.getElementById("detail").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function closeDetail() {
  document.getElementById("detail").style.display = "none";
  if (activeRow) { activeRow.classList.remove("active"); activeRow = null; }
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

init();
</script>
</body>
</html>
